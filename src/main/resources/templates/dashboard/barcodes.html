<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Barcodes')}"></head>
<body class="app-body">
<div class="app-shell">
    <div th:replace="~{fragments/layout :: back-dashboard}"></div>
    <header th:replace="~{fragments/layout :: header('All processed barcodes across production lines')}"></header>

    <div class="panel-card">
        <h2>Barcode List</h2>
        <div th:if="${barcodes.isEmpty()}" class="empty-state">No barcodes found in the database.</div>
        <div th:unless="${barcodes.isEmpty()}" class="table-scroll">
            <table class="table-modern">
                <thead>
                <tr>
                    <th>Barcode</th>
                    <th>Line ID</th>
                    <th>Status</th>
                    <th>Created Date</th>
                    <th>Last Status Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="barcode : ${barcodes}">
                    <td th:text="${barcode.barcode}">BC-001</td>
                    <td>
                        <a th:href="@{/dashboard/lines/{id}(id=${barcode.lineId})}"
                           th:text="${barcode.lineId}"
                           class="text-decoration-none"
                           style="color: var(--pink-600); font-weight: 600;">1</a>
                    </td>
                    <td><span th:replace="~{fragments/layout :: status-badge(${barcode.status})}"></span></td>
                    <td th:text="${barcode.creDate != null ? #temporals.format(barcode.creDate, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                    <td th:text="${barcode.lastStatusDate != null ? #temporals.format(barcode.lastStatusDate, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
